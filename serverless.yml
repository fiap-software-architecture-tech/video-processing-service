service: video-processing-service

provider:
    name: aws
    runtime: nodejs20.x
    region: us-east-1
    environment:
        AWS_REGION_CUSTOM: ${env:AWS_REGION}  # AWS_REGION é reservado pelo Lambda
        AWS_ENDPOINT: ${env:AWS_ENDPOINT}
        AWS_BUCKET_NAME: ${env:AWS_BUCKET_NAME}
        AWS_SQS_URL: ${env:AWS_SQS_URL}

plugins:
    - serverless-localstack

custom:
    localstack:
        stages:
            - local
        host: http://localhost
        edgePort: 4566

functions:
    processVideo:
        handler: dist/index.handler
        timeout: 300  # 5 minutos — processamento de vídeo pode demorar
        memorySize: 1024  # 1GB — necessário para processar vídeos
        events:
            - sqs:
                  arn:
                      Fn::GetAtt:
                          - VideoProcessingQueue
                          - Arn
                  batchSize: 1  # Processa 1 vídeo por vez

resources:
    Resources:
        VideoProcessingQueue:
            Type: AWS::SQS::Queue
            Properties:
                QueueName: video-processing-queue
                VisibilityTimeout: 360  # Maior que o timeout da Lambda
                MessageRetentionPeriod: 86400  # 1 dia
                RedrivePolicy:
                    deadLetterTargetArn:
                        Fn::GetAtt:
                            - VideoProcessingDLQ
                            - Arn
                    maxReceiveCount: 3
